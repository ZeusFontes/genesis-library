name: genesis
description: Projeto GÊNESIS - Streaming + Biblioteca Digital
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  go_router: ^16.0.0
  flutter_riverpod: ^3.0.0
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  video_player: ^2.10.0
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  http: ^1.2.2
  crypto: ^3.0.3

  # Novos pacotes — L2 (download PDF), L3/F1 (WebView interno)
  dio: ^5.7.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  remove_alpha_ios: true
  image_path: "assets/logo/genesis_logo.png"
  min_sdk_android: 21
  background_color: "#10002B"
